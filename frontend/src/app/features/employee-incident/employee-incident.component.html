<section class="employee-shell">
  <header class="employee-header">
    <div>
      <p class="eyebrow">Área de empleado</p>
      <h1>Registrar incidencia</h1>
      <p>Esta vista solo permite crear una nueva incidencia para que soporte la atienda después.</p>
    </div>

    <button type="button" class="secondary" (click)="logout()">Cerrar sesión</button>
  </header>

  <div class="status-card success" *ngIf="successMessage">{{ successMessage }}</div>
  <div class="status-card error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <form class="incident-card" [formGroup]="form" (ngSubmit)="submit()">
    <label>
      <span>Título</span>
      <input type="text" formControlName="titulo" placeholder="Ej. No puedo acceder al portal">
      <small *ngIf="form.controls.titulo.touched && form.controls.titulo.invalid">Ingresa un título válido.</small>
    </label>

    <label>
      <span>Descripción</span>
      <textarea rows="6" formControlName="descripcion" placeholder="Describe el problema con el mayor detalle posible"></textarea>
      <small *ngIf="form.controls.descripcion.touched && form.controls.descripcion.invalid">La descripción debe tener al menos 20 caracteres.</small>
    </label>

    <button type="submit" [disabled]="loading">{{ loading ? 'Registrando...' : 'Registrar incidencia' }}</button>
  </form>

  <section class="incident-list" *ngIf="recentIncidents.length">
    <p class="eyebrow">Últimos registros</p>
    <article class="incident-card small" *ngFor="let item of recentIncidents">
      <strong>#{{ item.id }} · {{ item.titulo }}</strong>
      <p>{{ item.descripcion }}</p>
    </article>
  </section>
</section>
