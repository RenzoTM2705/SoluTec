<div class="login-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>
                <mat-icon>login</mat-icon>
                Iniciar Sesión
            </mat-card-title>
            <mat-card-subtitle>Ingresa tus credenciales para acceder al sistema</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <!-- Mensaje de error -->
            <div *ngIf="errorMessage" class="error-message">
                <mat-icon>error_outline</mat-icon>
                <span>{{ errorMessage }}</span>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Correo electrónico</mat-label>
                    <input matInput formControlName="correo" placeholder="ejemplo@correo.com" type="email"
                        autocomplete="email">
                    <mat-icon matPrefix>email</mat-icon>
                    <mat-error *ngIf="loginForm.get('correo')?.hasError('required')">
                        El correo es requerido
                    </mat-error>
                    <mat-error *ngIf="loginForm.get('correo')?.hasError('email')">
                        Ingresa un correo válido
                    </mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Contraseña</mat-label>
                    <input matInput formControlName="password" placeholder="Ingresa tu contraseña"
                        [type]="hidePassword ? 'password' : 'text'" autocomplete="current-password">
                    <mat-icon matPrefix>lock</mat-icon>
                    <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
                        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>
                    <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
                        La contraseña es requerida
                    </mat-error>
                </mat-form-field>

                <button mat-raised-button color="primary" type="submit" class="full-width login-button"
                    [disabled]="isLoading || loginForm.invalid">
                    <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
                    <span *ngIf="!isLoading">Iniciar Sesión</span>
                    <span *ngIf="isLoading">Verificando...</span>
                </button>
            </form>
        </mat-card-content>

        <mat-card-actions>
            <button mat-button color="accent" routerLink="/register">
                ¿No tienes cuenta? Regístrate
            </button>
        </mat-card-actions>
    </mat-card>
</div>
