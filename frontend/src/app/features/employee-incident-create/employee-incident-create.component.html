<div class="noc-layout">
  <!-- Header sencillo -->
  <header class="noc-topbar">
    <div class="topbar-left">
      <a routerLink="/employee" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Volver al Panel
      </a>
    </div>
    <div class="topbar-right">
      <h3>Apertura de Ticket NOC</h3>
    </div>
  </header>

  <main class="noc-content centered-content">
    <div class="ticket-card">
      <div class="card-header">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="header-icon"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        <div>
          <h2>Nuevo Reporte de Incidencia</h2>
          <p>Complete los datos técnicos para derivar al equipo de soporte.</p>
        </div>
      </div>

      @if(errorMessage) {
        <div class="error-alert">{{ errorMessage }}</div>
      }

      <form [formGroup]="ticketForm" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <div class="form-group half-width">
            <label>Categoría del Problema</label>
            <div formGroupName="categoria">
              <select formControlName="id" class="input-field select-field">
                <option value="" disabled selected>Seleccione categoría...</option>
                <option value="1">Hardware / Equipos</option>
                <option value="2">Software / Sistemas</option>
                <option value="3">Red / Conectividad</option>
                <option value="4">Correo / Comunicaciones</option>
                <option value="5">Acceso / VPN</option>
              </select>
            </div>
          </div>

          <div class="form-group half-width">
            <label>Nivel de Prioridad</label>
            <div formGroupName="prioridad">
              <select formControlName="id" class="input-field select-field">
                <option value="" disabled selected>Seleccione prioridad...</option>
                <option value="1">Baja (Sin impacto operativo)</option>
                <option value="2">Media (Impacto parcial)</option>
                <option value="3">Alta (Bloqueo de trabajo)</option>
                <option value="4">Crítica (Falla general)</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Asunto / Título breve</label>
          <input type="text" formControlName="titulo" class="input-field" placeholder="Ej. No hay conexión a la VPN de ventas">
        </div>

        <div class="form-group">
          <label>Descripción detallada</label>
          <textarea formControlName="descripcion" class="input-field textarea-field" rows="5" placeholder="Describa el error, los pasos previos y cualquier mensaje que muestre el sistema..."></textarea>
        </div>

        <div class="form-actions">
          <a routerLink="/employee" class="btn-cancel">Cancelar</a>
          <button type="submit" class="btn-primary" [disabled]="ticketForm.invalid || isLoading">
            {{ isLoading ? 'Enviando...' : 'Generar Ticket' }}
          </button>
        </div>
      </form>
    </div>
  </main>
</div>
